<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroVision AI</title>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
    <div class="container">
        <h1>AgroVision AI</h1>

        <div class="grid">
            <section class="card">
                <h2>Feed ao Vivo</h2>
                <img id="live-frame" src="/frame" alt="Feed da camera">
                <p class="status" id="status">Conectado</p>
            </section>

            <section class="card">
                <h2>Agente AgroVision</h2>
                <div id="chat-history" class="chat-history"></div>
                <form id="chat-form">
                    <textarea id="chat-input" placeholder="Pergunte sobre os eventos recentes..." required></textarea>
                    <button type="submit">Enviar</button>
                </form>
            </section>
        </div>

        <section class="card">
            <h2>Ultimos Eventos</h2>
            <div id="events-container">
                <p class="no-events">Nenhum evento registrado ainda.</p>
            </div>
        </section>
    </div>
    <script src="/static/dashboard.js"></script>
</body>
</html>
